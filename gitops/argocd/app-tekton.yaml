apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sock-shop-tekton
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: https://github.com/avijra/sock-shop-rosa.git
    targetRevision: main
    path: gitops/tekton
  destination:
    server: https://kubernetes.default.svc
    namespace: microservice-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m
