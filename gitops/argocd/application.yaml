apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sock-shop
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: https://github.com/avijra/sock-shop-gitops.git
    targetRevision: main
    path: sock-shop
  destination:
    server: https://kubernetes.default.svc
    namespace: microservice-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
    - CreateNamespace=true
    - PruneLast=false
    - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
