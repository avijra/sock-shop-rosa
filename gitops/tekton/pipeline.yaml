apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: verify-sock-shop
  namespace: openshift-pipelines
spec:
  params:
  - name: namespace
    type: string
    default: microservice-app
  steps:
  - name: check-endpoints
    image: registry.access.redhat.com/ubi9/ubi-minimal:latest
    script: |
      microdnf install -y curl 2>/dev/null || true
      echo "=== Checking sock-shop front-end ==="
      curl -sS --max-time 15 https://front-end-microservice-app.apps.rosa.rosa-742gt.14kb.p3.openshiftapps.com | head -30
      echo "=== Front-end is LIVE ==="
---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: sock-shop-deploy-pipeline
  namespace: openshift-pipelines
spec:
  params:
  - name: target-namespace
    type: string
    default: microservice-app
  tasks:
  - name: verify-deployment
    taskRef:
      name: verify-sock-shop
      kind: Task
    params:
    - name: namespace
      value: "$(params.target-namespace)"
