apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: sock-shop-ci
  namespace: microservice-app
spec:
  workspaces:
    - name: shared-workspace
  params:
    - name: repo-url
      type: string
      description: Git repo to clone
    - name: revision
      type: string
      default: main
  tasks:
    - name: clone
      taskRef:
        name: git-clone
      workspaces:
        - name: output
          workspace: shared-workspace
      params:
        - name: repo-url
          value: $(params.repo-url)
        - name: revision
          value: $(params.revision)

    - name: yaml-lint
      taskRef:
        name: yaml-lint
      workspaces:
        - name: source
          workspace: shared-workspace
      runAfter:
        - clone

    - name: validate-manifests
      taskRef:
        name: validate-manifests
      workspaces:
        - name: source
          workspace: shared-workspace
      runAfter:
        - clone

    - name: summary
      taskRef:
        name: pipeline-summary
      params:
        - name: commit-sha
          value: $(tasks.clone.results.commit-sha)
        - name: commit-date
          value: $(tasks.clone.results.commit-date)
      runAfter:
        - yaml-lint
        - validate-manifests
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: pipeline-summary
  namespace: microservice-app
spec:
  params:
    - name: commit-sha
      type: string
    - name: commit-date
      type: string
  steps:
    - name: print
      image: bitnami/git:latest
      script: |
        echo "========================================"
        echo "  SOCK-SHOP CI PIPELINE COMPLETE"
        echo "========================================"
        echo "  Commit: $(params.commit-sha)"
        echo "  Date:   $(params.commit-date)"
        echo "  Status: SUCCESS"
        echo "========================================"
