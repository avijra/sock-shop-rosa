apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: git-clone
  namespace: microservice-app
spec:
  description: Clone a git repository to the workspace (idempotent)
  workspaces:
    - name: output
  params:
    - name: repo-url
      type: string
    - name: revision
      type: string
      default: main
  results:
    - name: commit-sha
    - name: commit-date
  steps:
    - name: clone
      image: bitnami/git:latest
      script: |
        #!/bin/bash
        set -euo pipefail
        TARGET="$(workspaces.output.path)"

        echo "[clone] Target: $TARGET"
        echo "[clone] Repo:   $(params.repo-url)"
        echo "[clone] Branch: $(params.revision)"

        if [ -d "$TARGET/.git" ]; then
          echo "[clone] .git exists — fetching updates"
          cd "$TARGET"
          git remote set-url origin "$(params.repo-url)" 2>/dev/null || git remote add origin "$(params.repo-url)"
          git fetch --depth 1 origin "$(params.revision)"
          git checkout "$(params.revision)" 2>/dev/null || git checkout -b "$(params.revision)" "origin/$(params.revision)"
          git reset --hard "origin/$(params.revision)"
          git clean -fdx
        else
          echo "[clone] Fresh clone"
          # Cannot rm -rf the mount point itself (PVC). Remove contents instead.
          find "$TARGET" -mindepth 1 -delete 2>/dev/null || true
          git clone --depth 1 --branch "$(params.revision)" "$(params.repo-url)" "$TARGET"
        fi

        cd "$TARGET"
        SHA="$(git rev-parse HEAD)"
        DATE="$(git log -1 --format=%cI)"
        echo "[clone] SHA:  $SHA"
        echo "[clone] Date: $DATE"
        printf '%s' "$SHA" | tee "$(results.commit-sha.path)"
        printf '%s' "$DATE" | tee "$(results.commit-date.path)"
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: yaml-lint
  namespace: microservice-app
spec:
  description: Validate YAML syntax
  workspaces:
    - name: source
  steps:
    - name: validate
      image: registry.access.redhat.com/ubi9/python-311:latest
      script: |
        #!/bin/bash
        set -e
        echo "=== Validating YAML syntax ==="
        pip install --quiet pyyaml 2>/dev/null
        for f in $(find "$(workspaces.source.path)" -name '*.yaml' ! -path '*/node_modules/*'); do
          python3 -c "
import sys, yaml
with open('$f') as fh:
    yaml.safe_load(fh)
print(f'OK: $f')
" 2>&1 || exit 1
        done
        echo "All YAML files valid"
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: validate-manifests
  namespace: microservice-app
spec:
  description: Validate K8s manifests with kubectl dry-run
  workspaces:
    - name: source
  params:
    - name: manifest-dir
      type: string
      default: gitops/sock-shop
  steps:
    - name: validate
      image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
      script: |
        #!/bin/bash
        set -e
        MANIFEST_DIR="$(workspaces.source.path)/$(params.manifest-dir)"
        echo "=== Validating manifests at $MANIFEST_DIR ==="
        if [ -d "$MANIFEST_DIR" ]; then
          for f in "$MANIFEST_DIR"/*.yaml; do
            [ -f "$f" ] || continue
            echo "  Dry-run: $(basename $f)"
            kubectl apply --dry-run=client -f "$f" 2>&1
          done
          echo "=== All manifests pass dry-run validation ==="
        else
          echo "No manifests found at $MANIFEST_DIR"
        fi
