apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: git-clone
  namespace: microservice-app
spec:
  description: Clone a git repository to the workspace
  workspaces:
    - name: output
  params:
    - name: repo-url
      type: string
    - name: revision
      type: string
      default: main
  results:
    - name: commit-sha
    - name: commit-date
  steps:
    - name: clone
      image: bitnami/git:latest
      script: |
        TARGET="$(workspaces.output.path)"
        rm -rf "$TARGET"/*
        git clone --depth 1 --branch "$(params.revision)" "$(params.repo-url)" "$TARGET"
        cd "$TARGET"
        printf '%s' "$(git rev-parse HEAD)" | tee "$(results.commit-sha.path)"
        printf '%s' "$(git log -1 --format=%cI)" | tee "$(results.commit-date.path)"
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: yaml-lint
  namespace: microservice-app
spec:
  description: Validate YAML syntax
  workspaces:
    - name: source
  steps:
    - name: validate
      image: bitnami/python:latest
      script: |
        pip install pyyaml -q
        find "$(workspaces.source.path)" -name '*.yaml' ! -path '*/node_modules/*' -exec sh -c '
          python3 -c "import yaml; yaml.safe_load(open(chr(0)))" "$1" 2>&1 || exit 1
        ' {} \;
        echo "All YAML valid"
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: validate-manifests
  namespace: microservice-app
spec:
  description: Validate K8s manifests
  workspaces:
    - name: source
  params:
    - name: manifest-dir
      type: string
      default: gitops/sock-shop
  steps:
    - name: kubeconform
      image: ghcr.io/yannh/kubeconform:latest
      script: |
        kubeconform -summary -skip ServiceAccount "$(workspaces.source.path)/$(params.manifest-dir)" 2>&1 || true
