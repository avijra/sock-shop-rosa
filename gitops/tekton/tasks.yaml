apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: apply-manifests
  namespace: openshift-pipelines
spec:
  params:
  - name: manifest_dir
    type: string
    description: Path to the manifest directory
    default: ./gitops/sock-shop
  - name: namespace
    type: string
    default: microservice-app
  steps:
  - name: apply
    image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
    script: |
      oc apply -f $(params.manifest_dir) -n $(params.namespace) --recursive
  - name: verify
    image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
    script: |
      echo "Verifying deployments..."
      oc rollout status deploy/front-end -n $(params.namespace) --timeout=120s || true
      oc rollout status deploy/catalogue -n $(params.namespace) --timeout=120s || true
      oc rollout status deploy/carts -n $(params.namespace) --timeout=120s || true
      oc rollout status deploy/orders -n $(params.namespace) --timeout=120s || true
      oc rollout status deploy/shipping -n $(params.namespace) --timeout=120s || true
      oc rollout status deploy/queue-master -n $(params.namespace) --timeout=120s || true
      oc rollout status deploy/user -n $(params.namespace) --timeout=120s || true
      oc get pods -n $(params.namespace)
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: update-gitops-repo
  namespace: openshift-pipelines
spec:
  params:
  - name: repo-url
    type: string
    description: GitOps repository URL
  - name: revision
    type: string
    default: main
  workspaces:
  - name: gitops-source
  steps:
  - name: sync-to-gitops
    image: image-registry.openshift-image-registry.svc:5000/openshift/git-tools:latest
    script: |
      echo "Simulating GitOps repo sync..."
      echo "Would push manifests to $(params.repo-url)"
      echo "Revision: $(params.revision)"
      echo "Sync complete — ArgoCD will pick up changes automatically"
