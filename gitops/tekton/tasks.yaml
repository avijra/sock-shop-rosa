apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: git-clone
  namespace: microservice-app
spec:
  description: Clone a git repository to the workspace
  workspaces:
    - name: output
  params:
    - name: repo-url
      type: string
    - name: revision
      type: string
      default: main
  results:
    - name: commit-sha
    - name: commit-date
  steps:
    - name: clone
      image: bitnami/git:latest
      script: |
        TARGET="$(workspaces.output.path)"
        rm -rf "$TARGET"/*
        git clone --depth 1 --branch "$(params.revision)" "$(params.repo-url)" "$TARGET"
        cd "$TARGET"
        printf '%s' "$(git rev-parse HEAD)" | tee "$(results.commit-sha.path)"
        printf '%s' "$(git log -1 --format=%cI)" | tee "$(results.commit-date.path)"
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: yaml-lint
  namespace: microservice-app
spec:
  description: Validate YAML syntax
  workspaces:
    - name: source
  steps:
    - name: validate
      image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
      script: |
        set -e
        echo "=== Validating YAML syntax ==="
        for f in $(find "$(workspaces.source.path)" -name '*.yaml' ! -path '*/node_modules/*'); do
          python3 -c "
import sys, yaml
with open('$f') as fh:
    yaml.safe_load(fh)
print(f'OK: $f')
" 2>&1 || exit 1
        done
        echo "All YAML files valid"
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: validate-manifests
  namespace: microservice-app
spec:
  description: Validate K8s manifests with kubectl dry-run
  workspaces:
    - name: source
  params:
    - name: manifest-dir
      type: string
      default: gitops/sock-shop
  steps:
    - name: validate
      image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
      script: |
        set -e
        MANIFEST_DIR="$(workspaces.source.path)/$(params.manifest-dir)"
        echo "=== Validating manifests with kubectl dry-run ==="
        if [ -d "$MANIFEST_DIR" ]; then
          for f in "$MANIFEST_DIR"/*.yaml; do
            [ -f "$f" ] || continue
            echo "Checking: $(basename $f)"
            kubectl apply --dry-run=client -f "$f" 2>&1 || true
          done
          echo "Validation complete"
        else
          echo "No manifests found at $MANIFEST_DIR"
        fi
