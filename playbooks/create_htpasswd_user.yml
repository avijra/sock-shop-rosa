---
- name: Create htpasswd admin user and configure OpenShift OAuth
  hosts: all
  gather_facts: false
  vars:
    admin_user: "Avijra"
    htpasswd_secret_name: "htpasswd-secret"
    htpasswd_file: "/tmp/htpasswd-avijra"

  tasks:
    - name: Generate htpasswd entry
      ansible.builtin.shell:
        cmd: htpasswd -nbB "{{ admin_user }}" "{{ htpasswd_admin_password }}"
      register: htpasswd_entry
      changed_when: false
      no_log: true

    - name: Write htpasswd file locally
      ansible.builtin.copy:
        content: "{{ htpasswd_entry.stdout }}\n"
        dest: "{{ htpasswd_file }}"
        mode: "0600"
      changed_when: true

    - name: Create htpasswd secret in openshift-config namespace
      ansible.builtin.shell:
        cmd: >
          oc create secret generic {{ htpasswd_secret_name }}
          --from-file=htpasswd={{ htpasswd_file }}
          -n openshift-config
          --dry-run=client -o yaml | oc apply -f -
      register: secret_result
      changed_when: "'configured' in secret_result.stdout or 'created' in secret_result.stdout"

    - name: Check current OAuth identity providers
      ansible.builtin.shell:
        cmd: oc get oauth cluster -o jsonpath='{.spec.identityProviders}' 2>/dev/null || echo "none"
      register: current_idps
      changed_when: false

    - name: Patch OAuth to add htpasswd IDP
      ansible.builtin.shell:
        cmd: |
          oc patch oauth cluster --type=merge -p '{
            "spec": {
              "identityProviders": [
                {
                  "name": "htpasswd_provider",
                  "mappingMethod": "claim",
                  "type": "HTPasswd",
                  "htpasswd": {
                    "fileData": {
                      "name": "{{ htpasswd_secret_name }}"
                    }
                  }
                }
              ]
            }
          }'
      register: oauth_patch
      changed_when: "'patched' in oauth_patch.stdout or 'configured' in oauth_patch.stdout"

    - name: Wait for OAuth pods to roll
      ansible.builtin.shell:
        cmd: |
          echo "Waiting for OAuth pods to restart..."
          sleep 15
          oc get pods -n openshift-authentication -o wide 2>/dev/null | head -5
      register: oauth_roll
      changed_when: false

    - name: Assign cluster-admin role to new user
      ansible.builtin.shell:
        cmd: oc adm policy add-cluster-role-to-user cluster-admin "{{ admin_user }}"
      register: role_result
      changed_when: "'added' in role_result.stdout or 'already' in role_result.stdout"
      failed_when: false

    - name: Verify user can authenticate
      ansible.builtin.shell:
        cmd: |
          echo "Login test (simulated)..."
          oc get users "{{ admin_user }}" -o jsonpath='{.name}' 2>/dev/null || echo "User may not appear until first login"
      register: verify_user
      changed_when: false

    - name: Clean up temp file
      ansible.builtin.file:
        path: "{{ htpasswd_file }}"
        state: absent
      changed_when: true

    - name: Show results
      ansible.builtin.debug:
        msg:
          - "User: {{ admin_user }}"
          - "Role: cluster-admin"
          - "Login: https://console-openshift-console.apps.rosa.rosa-742gt.14kb.p3.openshiftapps.com"
          - "Use 'Log in with htpasswd_provider' option on the login page"
