---
- name: Install OpenShift Operators and Sock Shop via oc CLI
  hosts: all
  gather_facts: false
  vars:
    kubeconfig: "{{ lookup('env', 'HOME') }}/.kube/config"

  tasks:
    - name: Create required namespaces
      ansible.builtin.shell:
        cmd: |
          oc create ns openshift-pipelines --dry-run=client -o yaml | oc apply -f -
          oc create ns microservice-app --dry-run=client -o yaml | oc apply -f -
      changed_when: false

    - name: Install OpenShift Pipelines Operator Subscription
      ansible.builtin.shell:
        cmd: |
          cat <<'EOF' | oc apply -f -
          apiVersion: operators.coreos.com/v1alpha1
          kind: Subscription
          metadata:
            name: openshift-pipelines-operator-rh
            namespace: openshift-operators
          spec:
            channel: latest
            name: openshift-pipelines-operator-rh
            source: redhat-operators
            sourceNamespace: openshift-marketplace
            installPlanApproval: Automatic
          EOF
      register: tekton_sub

    - name: Install OpenShift GitOps Operator Subscription
      ansible.builtin.shell:
        cmd: |
          cat <<'EOF' | oc apply -f -
          apiVersion: operators.coreos.com/v1alpha1
          kind: Subscription
          metadata:
            name: openshift-gitops-operator
            namespace: openshift-operators
          spec:
            channel: latest
            name: openshift-gitops-operator
            source: redhat-operators
            sourceNamespace: openshift-marketplace
            installPlanApproval: Automatic
          EOF
      register: gitops_sub

    - name: Wait for Tekton CSV to succeed
      ansible.builtin.shell:
        cmd: |
          for i in $(seq 1 40); do
            PHASE=$(oc get csv -n openshift-operators openshift-pipelines-operator-rh -o jsonpath='{.status.phase}' 2>/dev/null)
            if [ "$PHASE" = "Succeeded" ]; then echo "TEKTON_READY"; exit 0; fi
            sleep 15
          done
          echo "TIMEOUT"
          exit 1
        timeout: 600
      register: tekton_wait

    - name: Wait for GitOps CSV to succeed
      ansible.builtin.shell:
        cmd: |
          for i in $(seq 1 40); do
            PHASE=$(oc get csv -n openshift-operators openshift-gitops-operator -o jsonpath='{.status.phase}' 2>/dev/null)
            if [ "$PHASE" = "Succeeded" ]; then echo "GITOPS_READY"; exit 0; fi
            sleep 15
          done
          echo "TIMEOUT"
          exit 1
        timeout: 600
      register: gitops_wait

    - name: Report operator status
      ansible.builtin.debug:
        msg:
          - "Tekton Pipelines: {{ tekton_wait.stdout }}"
          - "OpenShift GitOps: {{ gitops_wait.stdout }}"
