---
- name: Create GitHub repo and push code (auth via token)
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    repo_name: sock-shop-rosa
    repo_description: "Sock Shop microservices on ROSA with Tekton pipeline + ArgoCD GitOps"
    git_user: avijra
    # The authenticated URL uses the token as password
    git_auth_url: "https://avijra:{{ GIT_PUSH_TOKEN }}@github.com/avijra/sock-shop-rosa.git"

  tasks:
    - name: Create repo on GitHub via API
      ansible.builtin.uri:
        url: "https://api.github.com/user/repos"
        method: POST
        headers:
          Authorization: "token {{ GIT_PUSH_TOKEN }}"
          Accept: "application/vnd.github.v3+json"
        body:
          name: "{{ repo_name }}"
          description: "{{ repo_description }}"
          private: false
        body_format: json
        status_code: [201, 422]
      register: repo_create

    - name: Set git remote with token auth
      ansible.builtin.shell:
        cmd: |
          git remote remove origin 2>/dev/null || true
          git remote add origin '{{ git_auth_url }}'
          echo "Remote set"
      args:
        chdir: "{{ playbook_dir }}/.."

    - name: Push to GitHub
      ansible.builtin.shell:
        cmd: git push -u origin main 2>&1
      args:
        chdir: "{{ playbook_dir }}/.."
      register: git_push
      changed_when: "'Everything up-to-date' not in git_push.stdout"
      ignore_errors: true

    - name: Show push result
      ansible.builtin.debug:
        var: git_push.stdout_lines | default(git_push.stderr_lines)

    - name: Final URL
      ansible.builtin.debug:
        msg: "Repo: https://github.com/avijra/sock-shop-rosa"
