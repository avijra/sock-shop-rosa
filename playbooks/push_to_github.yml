---
- name: Push Git repo to GitHub
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    repo_name: sock-shop-rosa
    git_user: avijra

  tasks:
    - name: Create GitHub repo via API
      ansible.builtin.shell:
        cmd: >
          curl -s -o /dev/null -w "%{http_code}"
          -H "Authorization: token {{ GIT_PUSH_TOKEN }}"
          -H "Accept: application/vnd.github.v3+json"
          -d '{"name":"sock-shop-rosa","description":"Sock Shop microservices on ROSA with Tekton + ArgoCD","private":false}'
          https://api.github.com/user/repos
      register: repo_create
      changed_when: repo_create.stdout == "201"
      failed_when: repo_create.stdout not in ["201", "422"]

    - name: Set git remote with token auth
      ansible.builtin.shell:
        cmd: |
          git remote remove origin 2>/dev/null || true
          git remote add origin 'https://{{ git_user }}:{{ GIT_PUSH_TOKEN }}@github.com/{{ git_user }}/{{ repo_name }}.git'
          echo "Remote set"
      args:
        chdir: "{{ playbook_dir }}/.."

    - name: Push to GitHub
      ansible.builtin.shell:
        cmd: git push -u origin main 2>&1
      args:
        chdir: "{{ playbook_dir }}/.."
      register: git_push
      changed_when: "'Everything up-to-date' not in git_push.stdout"
      failed_when: git_push.rc != 0 and 'Everything up-to-date' not in git_push.stdout

    - name: Show result
      ansible.builtin.debug:
        msg:
          - "Repo: https://github.com/{{ git_user }}/{{ repo_name }}"
          - "Push: {{ 'Success' if git_push.rc == 0 or 'Everything up-to-date' in git_push.stdout else 'Failed' }}"
