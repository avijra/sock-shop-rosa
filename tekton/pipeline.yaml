apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: sock-shop-ci
  namespace: microservice-app
spec:
  description: |
    CI pipeline for Sock-Shop microservice application.
    Clones the repo, validates YAML and Kubernetes manifests,
    and reports the results.
  workspaces:
    - name: shared-workspace
      description: Workspace shared across all tasks
  params:
    - name: repo-url
      type: string
      description: The git repository URL to clone from
    - name: revision
      type: string
      description: The git revision (branch/tag/commit)
      default: main
    - name: manifest-dir
      type: string
      description: Directory containing Kubernetes manifests
      default: gitops/sock-shop
  tasks:
    - name: clone
      taskRef:
        name: git-clone
      workspaces:
        - name: output
          workspace: shared-workspace
      params:
        - name: repo-url
          value: $(params.repo-url)
        - name: revision
          value: $(params.revision)

    - name: yaml-lint
      taskRef:
        name: yaml-lint
      workspaces:
        - name: source
          workspace: shared-workspace
      runAfter:
        - clone

    - name: validate-manifests
      taskRef:
        name: validate-manifests
      workspaces:
        - name: source
          workspace: shared-workspace
      params:
        - name: manifest-dir
          value: $(params.manifest-dir)
      runAfter:
        - clone

    - name: summary
      taskRef:
        name: pipeline-summary
      params:
        - name: commit-sha
          value: $(tasks.clone.results.commit-sha)
        - name: commit-date
          value: $(tasks.clone.results.commit-date)
      runAfter:
        - yaml-lint
        - validate-manifests
