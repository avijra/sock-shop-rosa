apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: git-clone
  namespace: microservice-app
spec:
  description: Clone a git repository to the workspace
  workspaces:
    - name: output
      description: The workspace to clone the repository into
  params:
    - name: repo-url
      type: string
      description: Git repository URL
    - name: revision
      type: string
      description: Git revision (branch/tag/commit)
      default: main
    - name: subdirectory
      type: string
      description: Subdirectory within the workspace to clone into
      default: ""
  results:
    - name: commit-sha
      description: The SHA of the cloned commit
    - name: commit-date
      description: The date of the cloned commit
  steps:
    - name: clone
      image: bitnami/git:latest
      script: |
        #!/bin/sh
        set -e
        REPO_URL="$(params.repo-url)"
        REVISION="$(params.revision)"
        TARGET_DIR="$(workspaces.output.path)/$(params.subdirectory)"

        echo "Cloning repository $(params.repo-url) revision $(params.revision)"

        if [ -d "$TARGET_DIR" ] && [ -n "$(ls -A "$TARGET_DIR" 2>/dev/null)" ]; then
          echo "Directory exists, pulling latest changes"
          cd "$TARGET_DIR"
          git fetch origin "$REVISION"
          git reset --hard "origin/$REVISION"
        else
          mkdir -p "$(dirname "$TARGET_DIR")"
          git clone --depth 1 --branch "$REVISION" "$REPO_URL" "$TARGET_DIR"
          cd "$TARGET_DIR"
        fi

        RESULT_SHA="$(git rev-parse HEAD)"
        RESULT_DATE="$(git log -1 --format=%cI)"

        printf '%s' "$RESULT_SHA" | tee "$(results.commit-sha.path)"
        printf '%s' "$RESULT_DATE" | tee "$(results.commit-date.path)"
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: yaml-lint
  namespace: microservice-app
spec:
  description: Validate YAML syntax in the repository
  workspaces:
    - name: source
      description: The workspace containing the cloned repository
  steps:
    - name: validate-yaml
      image: bitnami/python:latest
      script: |
        #!/bin/bash
        set -e
        pip install pyyaml --quiet 2>/dev/null

        echo "=== Validating YAML syntax ==="
        ERRORS=0
        while IFS= read -r f; do
          if python3 -c "
import sys, yaml
try:
    with open('$f') as fh:
        yaml.safe_load(fh)
    print('OK: $f')
except Exception as e:
    print(f'FAIL: $f - {e}')
    sys.exit(1)
" 2>&1; then
            :
          else
            ((ERRORS++))
          fi
        done < <(find "$(workspaces.source.path)" -name '*.yaml' -not -path '*/node_modules/*')

        if [ "$ERRORS" -gt 0 ]; then
          echo "FAILED: $ERRORS YAML file(s) have errors"
          exit 1
        fi
        echo "ALL YAML files validated successfully"
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: validate-manifests
  namespace: microservice-app
spec:
  description: Validate Kubernetes manifests using dry-run and kubeconform
  workspaces:
    - name: source
      description: The workspace containing manifests to validate
  params:
    - name: manifest-dir
      type: string
      description: Directory containing Kubernetes manifests
      default: gitops/sock-shop
  steps:
    - name: validate-kubeconform
      image: ghcr.io/yannh/kubeconform:latest
      script: |
        #!/bin/sh
        set -e
        MANIFEST_DIR="$(workspaces.source.path)/$(params.manifest-dir)"
        echo "=== Validating manifests with kubeconform ==="
        if [ -d "$MANIFEST_DIR" ]; then
          kubeconform \
            -summary \
            -skip ServiceAccount \
            -verbose \
            "$MANIFEST_DIR"/*.yaml 2>&1 || true
          echo "Validation complete"
        else
          echo "Manifest directory $MANIFEST_DIR not found, skipping"
        fi
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: pipeline-summary
  namespace: microservice-app
spec:
  description: Print summary of pipeline execution
  params:
    - name: commit-sha
      type: string
      description: The commit SHA that was cloned
    - name: commit-date
      type: string
      description: The commit date
  steps:
    - name: print-summary
      image: bitnami/git:latest
      script: |
        #!/bin/sh
        echo "========================================"
        echo "  SOCK-SHOP CI PIPELINE COMPLETE"
        echo "========================================"
        echo "  Commit SHA:  $(params.commit-sha)"
        echo "  Commit Date: $(params.commit-date)"
        echo "  Timestamp:   $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
        echo "  Result:      SUCCESS"
        echo "========================================"
